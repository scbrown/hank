[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/scbrown/hank
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
          {% if commit.breaking %}[**breaking**] {% endif %}\
          {{ commit.message | upper_first }}\
          ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

# Strip internal ticket IDs from PUBLISHED changelog entries. Commit messages
# keep the refs (internal git history wants them); the public CHANGELOG must
# not carry them — same enforcement split as the pre-push guard, and the same
# preprocessor block quipu's cliff.toml carries. Without this, an entry like
# "... pre-edit guard (<internal-id>)" ships verbatim (it was about to).
commit_preprocessors = [
    # "(ID, rest)" -> "(rest)"
    { pattern = '\((?:aegis|hq|gassy|qp)-[a-z0-9]{3,6},[ \t]*', replace = "(" },
    # "(rest, ID)" -> "(rest)"
    { pattern = ',[ \t]*(?:aegis|hq|gassy|qp)-[a-z0-9]{3,6}\)', replace = ")" },
    # " (ID)" standalone paren -> removed
    { pattern = '[ \t]*\((?:aegis|hq|gassy|qp)-[a-z0-9]{3,6}\)', replace = "" },
    # any bare leftover " ID"
    { pattern = '[ \t]*\b(?:aegis|hq|gassy|qp)-[a-z0-9]{3,6}\b', replace = "" },
]

commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^doc", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    { body = ".*security", group = "Security" },
    { message = "^revert", group = "Reverted" },
]
