<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="strandA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F"/><stop offset="100%" style="stop-color:#C45B3C"/>
    </linearGradient>
    <linearGradient id="strandB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D85C6"/><stop offset="100%" style="stop-color:#2A6BAD"/>
    </linearGradient>
    <linearGradient id="strandC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81B29A"/><stop offset="100%" style="stop-color:#5E9B7E"/>
    </linearGradient>
    <linearGradient id="strandD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2CC8F"/><stop offset="100%" style="stop-color:#D4A95A"/>
    </linearGradient>
    <linearGradient id="tieGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B72AA"/><stop offset="100%" style="stop-color:#7D5691"/>
    </linearGradient>
    <!-- Iris: a bright centre falling to a deep rim, so each lobe reads as a lens/eye. -->
    <radialGradient id="iris" cx="42%" cy="38%" r="65%">
      <stop offset="0%" style="stop-color:#7FB4E0"/>
      <stop offset="55%" style="stop-color:#3D85C6"/>
      <stop offset="100%" style="stop-color:#1E5288"/>
    </radialGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Badge -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="#2d2d4a" stroke-width="1.5"/>

  <!-- The eyes come first so the coiled strands read as the goggle RIMS framing each lens.
       hank is an agent's vision goggles: the two lobes of the feedback loop are a pair of
       eyes; the coil is what the agent sees the live code structure THROUGH. -->
  <!-- Right eye (right lobe) -->
  <g filter="url(#soft)">
    <circle cx="334" cy="256" r="46" fill="#12122a"/>
    <circle cx="334" cy="256" r="40" fill="url(#iris)"/>
    <circle cx="334" cy="256" r="17" fill="#0c0c1c"/>
    <circle cx="322" cy="243" r="7" fill="#ffffff" opacity="0.92"/>
    <circle cx="341" cy="266" r="3" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- Left eye (left lobe) -->
  <g filter="url(#soft)">
    <circle cx="178" cy="256" r="46" fill="#12122a"/>
    <circle cx="178" cy="256" r="40" fill="url(#iris)"/>
    <circle cx="178" cy="256" r="17" fill="#0c0c1c"/>
    <circle cx="166" cy="243" r="7" fill="#ffffff" opacity="0.92"/>
    <circle cx="185" cy="266" r="3" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- A hank wound into an infinity / feedback loop: four yarn strands coiled along the
       lemniscate. Crossing at centre; offset copies read as a wound skein — and as the
       goggle rims around the two eyes above. -->
  <g filter="url(#soft)" fill="none" stroke-linecap="round">
    <g transform="translate(0,-11)"><path d="M256 256 C300 202 374 202 402 256 C374 310 300 310 256 256 C212 202 138 202 110 256 C138 310 212 310 256 256 Z" stroke="url(#strandA)" stroke-width="9"/></g>
    <g transform="translate(0,-4)"><path d="M256 256 C300 202 374 202 402 256 C374 310 300 310 256 256 C212 202 138 202 110 256 C138 310 212 310 256 256 Z" stroke="url(#strandB)" stroke-width="9"/></g>
    <g transform="translate(0,4)"><path d="M256 256 C300 202 374 202 402 256 C374 310 300 310 256 256 C212 202 138 202 110 256 C138 310 212 310 256 256 Z" stroke="url(#strandC)" stroke-width="9"/></g>
    <g transform="translate(0,11)"><path d="M256 256 C300 202 374 202 402 256 C374 310 300 310 256 256 C212 202 138 202 110 256 C138 310 212 310 256 256 Z" stroke="url(#strandD)" stroke-width="9"/></g>
  </g>

  <!-- Feedback-loop arrowheads: flow direction along the coil (right lobe → right, left lobe → left) -->
  <path d="M326 188 L352 200 L326 212 Z" fill="#F2CC8F" filter="url(#soft)"/>
  <path d="M186 188 L160 200 L186 212 Z" fill="#E07A5F" filter="url(#soft)"/>

  <!-- Live-structure hint: graph nodes at the lobe tips, faint edges to the tie -->
  <line x1="256" y1="256" x2="402" y2="256" stroke="#ffffff14" stroke-width="1.5"/>
  <line x1="256" y1="256" x2="110" y2="256" stroke="#ffffff14" stroke-width="1.5"/>
  <circle cx="402" cy="256" r="7" fill="#3D85C6" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="110" cy="256" r="7" fill="#81B29A" stroke="#1a1a2e" stroke-width="2"/>

  <!-- The knot / goggle bridge: strands cross and are tied at the centre, joining the two
       lenses like the bridge of a pair of goggles (hank tied at its waist; quipu ties the knot) -->
  <circle cx="256" cy="256" r="17" fill="url(#tieGrad)" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="17" fill="none" stroke="#ffffff33" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="5" fill="#ffffff" opacity="0.85"/>
</svg>
