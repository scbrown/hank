name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            flags: ""
          - name: mcp
            flags: "--features mcp"
          - name: langs-extra
            flags: "--features langs-extra"
          - name: quipu
            flags: "--features quipu"
          - name: mcp+quipu
            flags: "--features mcp,quipu"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-${{ matrix.name }}-
            ${{ runner.os }}-cargo-
      - run: cargo clippy ${{ matrix.flags }} -- -D warnings -A missing-docs

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            flags: ""
          - name: mcp
            flags: "--features mcp"
          - name: langs-extra
            flags: "--features langs-extra"
          - name: quipu
            flags: "--features quipu"
          - name: mcp+quipu
            flags: "--features mcp,quipu"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.name }}-
            ${{ runner.os }}-cargo-
      - run: cargo test ${{ matrix.flags }}

  # Feature arms join the matrix as their engines land, so a feature can never
  # "ship dark" (Bobbin's hard-won lesson). --features quipu joined in Phase 4
  # (promotion): its tests are in-process (rudof SHACL) and the refusal path
  # returns before any network call, so the arm needs no live Quipu.

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo build

  check:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      - run: pre-commit run --all-files
        env:
          SKIP: mdbook-build,cargo-clippy

  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx markdownlint-cli2
