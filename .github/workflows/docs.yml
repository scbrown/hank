name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Publishes the mdBook to the `gh-pages` branch (contents:write), which GitHub
# Pages then serves. This avoids the official Pages deploy path, which needs a
# `pages: write` token this repo's integration doesn't grant. One-time setup:
# Settings → Pages → "Deploy from a branch" → gh-pages / (root).
permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: cargo install mdbook --version "^0.4" --locked
      - name: Build book
        run: mdbook build docs/book
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book/book
          publish_branch: gh-pages
