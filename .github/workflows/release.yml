name: Release

# Publish a downloadable hank binary on every version tag. CI (ci.yml) proves the
# code builds/tests; this proves it SHIPS — a build with no release artifact is a
# tool nobody downstream can install (aegis-dh32).
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # create the GitHub release + upload the asset

jobs:
  binary:
    name: Release binary (x86_64-linux-gnu)
    # ubuntu-22.04 ships glibc 2.35 — older than every consumer host, so a
    # dynamically-linked binary built here runs on all of them (build on the
    # OLDEST glibc you must support; forward-compat only). Static musl is a
    # follow-up once the C-dep toolchain (musl-tools) is wired in.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      # mcp + langs-extra = the useful runtime set (`hank serve` + all grammars);
      # both arms already pass in ci.yml, so this is a proven build.
      - name: Build release binary
        run: cargo build --release --features mcp,langs-extra

      - name: Package
        run: |
          set -euo pipefail
          bin=target/release/hank
          test -x "$bin" || { echo "no binary at $bin"; exit 1; }
          "$bin" --version
          tarball="hank-${GITHUB_REF_NAME}-x86_64-linux-gnu.tar.gz"
          tar -czf "$tarball" -C target/release hank
          sha256sum "$tarball" | tee "$tarball.sha256"
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Publish release + asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The API is the flaky part, not the build. v0.1.0's first run built and
          # packaged fine and then lost the whole release to a transient
          # "HTTP 503: No server is currently available" from api.github.com. A
          # release that discards a good binary because an API blipped is a
          # publish step that fails for reasons unrelated to the artifact — so
          # retry with backoff before giving up.
          retry() {
            local n=1
            until "$@"; do
              if [ "$n" -ge 5 ]; then
                echo "::error::giving up after $n attempts: $*"
                return 1
              fi
              echo "attempt $n failed: $* — retrying in $((n * 15))s"
              sleep $((n * 15))
              n=$((n + 1))
            done
          }
          # Create the release if the tag has none yet; either way, attach the asset.
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            retry gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" --generate-notes
          fi
          retry gh release upload "${GITHUB_REF_NAME}" \
            "${TARBALL}" "${TARBALL}.sha256" --clobber
          # Assert the effect, not the exit code: the asset must actually be listed.
          gh release view "${GITHUB_REF_NAME}" --json assets \
            --jq '.assets[].name' | grep -q "${TARBALL}"
          echo "published ${TARBALL} on ${GITHUB_REF_NAME}"
